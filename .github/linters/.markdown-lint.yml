# Markdownlint configuration
# Strict rules — only disable what cannot be fixed project-wide

# Issue templates start with YAML frontmatter, not a heading
MD041: false

# Inline HTML is used in README badges, Slidev components, and task lists
MD033: false

# Line length — not practical for tables, URLs, and prose
MD013: false

# Table column alignment — emoji characters have variable width,
# causing false positives on tables with emoji content
MD060: false
